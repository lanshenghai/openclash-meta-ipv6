# OpenClash / Mihomo sample — TUN mode (redir-host + sniffer)
# Replace REPLACE_* placeholders before use. See README.md.
# Do NOT add a manual `tun:` block — OpenClash injects it when en_mode=redir-host-tun.
mode: rule
allow-lan: true
bind-address: 0.0.0.0
ipv6: true
external-controller: 0.0.0.0:9090
external-ui: "/usr/share/openclash/ui"
secret: REPLACE_DASHBOARD_SECRET
dns:
  enable: true
  # redir-host：返回真实 A/AAAA；配合 sniffer 做域名分流
  ipv6: true
  enhanced-mode: redir-host
  listen: 0.0.0.0:7874
  listen6: '[::]:7874'
  respect-rules: true
  nameserver-policy:
    geosite:cn:
      - 202.101.172.35
      - 202.101.172.46
      - 114.114.114.114
      - 223.5.5.5
  direct-nameserver:
    - 202.101.172.35
    - 202.101.172.46
    - 114.114.114.114
    - 223.5.5.5
  nameserver:
    - 202.101.172.35
    - 202.101.172.46
    - 114.114.114.114
    - 223.5.5.5
  fallback:
    - https://dns.cloudflare.com/dns-query
    - tls://dns.google:853
    - https://1.1.1.1/dns-query
  proxy-server-nameserver:
    - 202.101.172.35
    - 202.101.172.46
    - 114.114.114.114
    - 223.5.5.5
    - https://1.1.1.1/dns-query

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.net"
    - "+.com"
    - "+.cn"

experimental:
  sniff-tls-sni: true
profile:
  store-selected: true

proxies: []
proxy-providers:
  provider1:
    type: http
    path: ./providers/provider1.yaml
    url: "REPLACE_SUBSCRIPTION_URL_1"
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
  provider2:
    type: http
    path: ./providers/provider2.yaml
    url: "REPLACE_SUBSCRIPTION_URL_2"
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    timeout: 3000
    tolerance: 50
    lazy: true
    exclude-filter: "(?i)剩余|到期|官网|更新|过期|流量|应急|测试|丢失|失败|通知|试用|下载|重置|刷新|电报|http|套餐|到期时间|[2-9]x|倍"
    use:
      - provider1
      - provider2

  - name: 代理
    type: select
    proxies:
      - 自动选择
      - DIRECT

rule-providers:
  Reject:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Reject.yaml
    path: ./rule_provider/Reject
    interval: 86400
  AppleMusic:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Media/Apple%20Music.yaml
    path: ./rule_provider/Apple_Music
    interval: 86400
  AppleTV:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Media/Apple%20TV.yaml
    path: ./rule_provider/Apple_TV
    interval: 86400
  Apple:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Apple.yaml
    path: ./rule_provider/Apple
    interval: 86400
  GoogleFCM:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Google%20FCM.yaml
    path: ./rule_provider/GoogleFCM
    interval: 86400
  YouTube:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Media/YouTube.yaml
    path: ./rule_provider/YouTube
    interval: 86400
  Telegram:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Telegram.yaml
    path: ./rule_provider/Telegram
    interval: 86400
  PROXY:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Proxy.yaml
    path: ./rule_provider/Proxy
    interval: 86400
  Domestic:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Domestic.yaml
    path: ./rule_provider/Domestic
    interval: 86400

